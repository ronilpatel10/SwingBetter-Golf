<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Author: Ronil Patel -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwingBetter Golf - Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="page">

        <header>
            <div class="logo">
                <img src="images/logo.png" alt="SwingBetter Golf logo">
            </div>

            <nav>
                <a href="index.html">Home</a>
                <a href="training.html">Training</a>
                <a href="clubs.html">Clubs</a>
                <a href="courses.html">Courses</a>
                <a href="login.html">Login</a>
            </nav>
        </header>

        <main>
            <img src="images/logo.png" alt="SwingBetter Golf logo" class="login-logo">

            <div class="login-card">
                <h2>Member Login</h2>

                <input type="text" placeholder="Username">
                <input type="password" placeholder="Password">

                <button type="button">Login</button>

                <p class="signup-text">
                    New to SwingBetter Golf?
                </p>

                <details class="signup-box">
                    <summary>Create an Account</summary>

                    <input type="text" placeholder="Full Name">
                    <input type="email" placeholder="Email Address">
                    <input type="text" placeholder="Choose Username">
                    <input type="password" placeholder="Create Password">

                    <button type="button">Sign Up</button>
                </details>
            </div>
        </main>

        <footer>
            <p>© 2026 SwingBetter Golf</p>
            <p>Contact | About | Social Media</p>
        </footer>

    </div>
</body>
</html>
